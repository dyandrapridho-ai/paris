<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SummitX</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

  <form action="dashboard.html" method="POST" class="p-8 bg-white shadow-lg rounded-xl w-80">
    <h2 class="mb-6 text-2xl font-bold text-center">Login Akun</h2>

    <label class="text-sm font-semibold">Email</label>
    <input type="email" name="email" required
           class="w-full px-3 py-2 mb-3 border rounded-lg">

    <label class="text-sm font-semibold">Password</label>
    <input type="password" name="password" required
           class="w-full px-3 py-2 mb-5 border rounded-lg">

    <button type="submit"
      class="w-full py-2 font-semibold text-white transition bg-red-600 rounded-lg hover:bg-red-700">
      Login
    </button>

    <p class="mt-3 text-xs text-center">
      Belum punya akun? <a href="#" class="font-semibold text-red-600">Daftar</a>
    </p>
  </form>

</body>
</html>
