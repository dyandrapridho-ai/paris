<!DOCTYPE html>
<html>
<head>
    <title>Daftar Akun</title>
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="p-8 bg-white rounded-lg shadow-xl w-96">
    <h2 class="mb-4 text-2xl font-bold text-center">Daftar Akun</h2>

    <form action="register.php" method="POST">

        <label class="block mb-2">Username</label>
        <input type="text" name="username"
            class="w-full p-2 mb-4 border rounded" required>

        <label class="block mb-2">Email</label>
        <input type="email" name="email"
            class="w-full p-2 mb-4 border rounded" required>

        <label class="block mb-2">Password</label>
        <input type="password" name="password"
            class="w-full p-2 mb-4 border rounded" required>

        <button class="w-full py-2 text-white bg-blue-600 rounded hover:bg-blue-700">
            Daftar
        </button>

    </form>

    <p class="mt-3 text-sm text-center">
        Sudah punya akun? <a href="login.html" class="text-blue-600">Login</a>
    </p>
</div>

</body>
</html>
